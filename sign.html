<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | YUMNA STUDIO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="sign.css">
</head>
<body class="register-page-body">

      <header>
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
            <div class="container">
                <a class="navbar-brand font-elegant text-uppercase tracking-widest" href="index.html">YUMNA</a>
                
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#fashionNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="fashionNavbar">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 text-uppercase tracking-wide">
                        <li class="nav-item"><a class="nav-link active" href="index.html#home">Home</a></li>
                        <li class="nav-item"><a class="nav-link " href="index.html#collection">Collection</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#services">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
                    </ul>
                    
                    <div class="d-flex align-items-center gap-3 structural-tools">
                        
                        <div class="fav-active-indicator text-white tracking-wide small">
                           <a href="heart.html"> <span class="fav-label-icon">❤️</span> WISHLIST <span class="active-badge-dot"></span></a>
                        </div>

                        <div class="cart-box position-relative">
                            <a href="cart.html" class="nav-utility-target d-inline-block text-decoration-none">
                                <span class="utility-icon">🛒</span>
                                <span class="position-absolute translate-middle badge rounded-pill bg-white text-black utility-counter-badge">2</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="container-fluid h-100 p-0 overflow-x-hidden">
        <div class="row g-0 min-vh-100 align-items-stretch">
            
            <div class="col-12 col-md-6 position-relative editorial-image-side">
                <div class="editorial-image-overlay"></div>
                <div class="editorial-branding-box text-white p-5">
                    <span class="editorial-micro-tag text-uppercase tracking-widest text-muted">The Atelier</span>
                    <h2 class="display-4 font-elegant text-uppercase tracking-widest mt-2 mb-4">THE<br>CANVAS</h2>
                    <p class="font-elegant-serif text-muted lead">
                        "Fashion is about dressing according to what's fashionable. Style is more about being yourself."
                    </p>
                </div>
            </div>
            
            <div class="col-12 col-md-6 d-flex align-items-center justify-content-center px-4 py-5 bg-form-side">
                <div class="register-editorial-form-box w-100">
                    
                    <div class="mb-5 text-center text-md-start">
                        <span class="register-micro-tag text-uppercase tracking-widest text-muted">Join the Collective</span>
                        <h1 class="font-elegant text-white text-uppercase tracking-wide mt-2">Create Account</h1>
                    </div>

                    <form class="fashion-minimal-form">
                        <div class="mb-4">
                            <input type="text" class="form-control minimal-input" placeholder="FULL NAME" required autocomplete="off">
                        </div>
                        <div class="mb-4">
                            <input type="email" class="form-control minimal-input" placeholder="EMAIL ADDRESS" required autocomplete="off">
                        </div>
                        <div class="mb-4">
                            <input type="password" class="form-control minimal-input" placeholder="CHOOSE PASSWORD" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" class="form-control minimal-input" placeholder="CONFIRM PASSWORD" required>
                        </div>

                        <div class="mt-5">
                            <button type="submit" class="btn btn-submit-luxury text-uppercase tracking-wide w-100 py-3">Sign Up</button>
                        </div>
                    </form>

                    <div class="text-center text-md-start mt-5 pt-3 border-top border-secondary-dark">
                        <p class="small text-muted mb-0">
                            Already a studio member? <a href="login.html" class="text-white text-decoration-none ms-1 tracking-wide login-toggle-link">Login to Studio</a>
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
